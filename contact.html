<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - MLG XGame</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: black;
  color: #9900ff;
  margin: 0;
  padding: 20px;
}

h1, h2 {
  color: #ffffff;
}

.container {
  max-width: 900px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0 15px 0;
  border: 1px solid #9900ff;
  background-color: #111;
  color: #fff;
  border-radius: 5px;
}

button {
  background-color: #9900ff;
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background-color: #7a00cc;
}
</style>
</head>

<body>

<div class="container">

<h1>Contactez-nous</h1>
<p>Vous avez une question ou une suggestion ? Utilisez le formulaire ci-dessous pour nous envoyer un message.</p>

<form action="mailto:mlgxgame@gmail.com" method="post" enctype="text/plain">
  <label for="name">Nom :</label>
  <input type="text" id="name" name="name" required>

  <label for="email">Email :</label>
  <input type="email" id="email" name="email" required>

  <label for="message">Message :</label>
  <textarea id="message" name="message" rows="6" required></textarea>

  <button type="submit">Envoyer</button>
</form>

</div>

</body>
