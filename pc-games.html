<style>
:root{--purple:#9900ff;--cyan:#00f0ff;--bg:#000;--bg2:#0a0a1a;--bg3:#1a0a2e;--text:#ccc;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Rajdhani',sans-serif;background:linear-gradient(135deg,#000,#0a0a1a);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}

/* HEADER */
header{background:#000;box-shadow:0 0 25px #9900ff55;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;background:linear-gradient(90deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;text-decoration:none;}
.back-btn{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--cyan);text-decoration:none;border:1px solid var(--cyan);padding:8px 14px;border-radius:6px;letter-spacing:1px;transition:0.25s;min-height:36px;display:flex;align-items:center;}
.back-btn:hover,.back-btn:active{background:var(--cyan);color:#000;}

/* SEARCH */
.search-wrap{padding:14px 16px 8px;}
.search-wrap input{width:100%;padding:12px 16px;border:1px solid #9900ff44;border-radius:10px;font-size:15px;font-family:'Rajdhani',sans-serif;outline:none;background:#0a0a1a;color:#fff;-webkit-appearance:none;transition:0.2s;}
.search-wrap input:focus{border-color:var(--purple);box-shadow:0 0 12px #9900ff33;}
.search-wrap input::placeholder{color:#555;}

/* CATEGORIES */
.categories{display:flex;overflow-x:auto;gap:8px;padding:10px 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.categories::-webkit-scrollbar{display:none;}
.cat-btn{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;padding:9px 16px;border-radius:20px;border:1px solid var(--purple);color:#cc55ff;background:#9900ff15;white-space:nowrap;cursor:pointer;transition:0.2s;min-height:36px;display:flex;align-items:center;user-select:none;-webkit-user-select:none;}
.cat-btn:hover,.cat-btn.active,.cat-btn:active{background:var(--purple);color:#fff;box-shadow:0 0 14px #9900ff55;}

/* SECTION TITLE */
.section-header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;}
.section-header h2{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
.section-header::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--purple),transparent);}

/* GRID — cartes PC plus larges */
.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;padding:0 12px 20px;}

/* CARD */
.card{position:relative;height:190px;border-radius:14px;overflow:hidden;border:1px solid #9900ff33;box-shadow:0 0 10px #00000088;transition:transform 0.25s,box-shadow 0.25s;background:var(--bg3);}
.card:active{transform:scale(0.97);}
@media(hover:hover){.card:hover{transform:scale(1.03);box-shadow:0 0 20px #9900ff55;border-color:var(--purple);}}
.card img{width:100%;height:100%;object-fit:cover;display:block;}
.card-content{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,rgba(0,0,0,0.95) 55%,rgba(0,0,0,0.3));padding:8px;box-sizing:border-box;}
.card h3{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--purple);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card p{font-size:10px;color:#bbb;margin:0 0 7px 0;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.badge-cat{display:inline-block;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;padding:2px 7px;border-radius:10px;border:1px solid #9900ff55;color:#cc55ff;background:#9900ff15;margin-bottom:4px;}

/* DL BUTTON */
.dl-btn{display:block;width:100%;padding:9px;border:none;border-radius:8px;background:linear-gradient(90deg,var(--purple),#6600cc);color:#fff;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:0.2s;min-height:36px;text-align:center;text-decoration:none;}
.dl-btn:active{filter:brightness(1.3);transform:scale(0.98);}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:40px 20px;font-family:'Orbitron',sans-serif;font-size:13px;color:#555;letter-spacing:2px;}

/* COMMENTS */
.comments-section{background:var(--bg3);padding:16px;border-radius:12px;margin:0 12px 24px;border:1px solid #9900ff22;}
.comments-section h2{font-family:'Orbitron',sans-serif;font-size:13px;color:#fff;letter-spacing:2px;margin-bottom:14px;}
.comment-form{display:flex;gap:8px;margin-bottom:14px;}
.comment-form input{flex:1;padding:10px 12px;border-radius:8px;border:1px solid #9900ff44;background:#000;color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;min-height:42px;}
.comment-form input:focus{border-color:var(--purple);}
.comment-form button{padding:10px 16px;border:none;border-radius:8px;background:var(--purple);color:#fff;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;cursor:pointer;min-height:42px;white-space:nowrap;}
#comments-list .comment{background:#000;padding:10px 12px;border-radius:8px;margin-bottom:8px;font-size:13px;border-left:3px solid var(--purple);}

/* FOOTER */
footer{text-align:center;padding:16px;background:var(--bg2);font-size:12px;color:#555;border-top:1px solid #9900ff22;}
footer a{color:#9900ff88;text-decoration:none;margin:0 6px;}
footer a:hover{color:var(--purple);}

/* RESPONSIVE */
@media(max-width:360px){.games{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 10px 16px;}.card{height:175px;}}
@media(min-width:600px){.games{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}}
@media(min-width:900px){.games{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}}
</style>
</head>

function renderGames(list){
  const c=document.getElementById("games");c.innerHTML="";
  if(!list.length){c.innerHTML='<div class="empty">Aucun jeu trouvé 😕</div>';return;}
  list.forEach(g=>{
    const d=document.createElement('div');d.className='card';
    d.innerHTML=`<img src="${g.img}" alt="${g.nom}" loading="lazy" onerror="this.style.background='#1a0a2e';this.src=''">
    <div class="card-content">
      <span class="badge-cat">${g.categorie}</span>
      <h3>${g.nom}</h3>
      <p>${g.description}</p>
      <a class="dl-btn" href="${g.lien}" target="_blank" rel="noopener">⬇ Télécharger</a>
    </div>`;
    c.appendChild(d);
  });
}
renderGames(pcGames);

function filter(cat,btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const t=document.getElementById('section-title');
  if(cat==='all'){t.textContent='Tous les jeux PC';renderGames(pcGames);}
  else{t.textContent=cat;renderGames(pcGames.filter(g=>g.categorie===cat));}
}

function searchGame(){
  const v=document.getElementById("search").value.toLowerCase().trim();
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.cat-btn').classList.add('active');
  if(!v){renderGames(pcGames);return;}
  renderGames(pcGames.filter(g=>g.nom.toLowerCase().includes(v)||g.description.toLowerCase().includes(v)));
}

function addComment(){
  const input=document.getElementById("comment-input");
  const text=input.value.trim();if(!text)return;
  const div=document.createElement("div");div.className="comment";div.textContent=text;
  document.getElementById("comments-list").prepend(div);input.value="";
}
