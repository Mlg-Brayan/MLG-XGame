  <style>
:root{--purple:#9900ff;--cyan:#00f0ff;--bg:#000;--bg2:#0a0a1a;--bg3:#1a0a2e;--text:#ccc;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Rajdhani',sans-serif;background:linear-gradient(135deg,#000,#0a0a1a);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
header{background:#000;box-shadow:0 0 25px #9900ff55;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;background:linear-gradient(90deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;text-decoration:none;}
.back-btn{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--cyan);text-decoration:none;border:1px solid var(--cyan);padding:8px 14px;border-radius:6px;letter-spacing:1px;transition:0.25s;min-height:36px;display:flex;align-items:center;}
.back-btn:hover,.back-btn:active{background:var(--cyan);color:#000;}
.search-wrap{padding:14px 16px 8px;}
.search-wrap input{width:100%;padding:12px 16px;border:1px solid #9900ff44;border-radius:10px;font-size:15px;font-family:'Rajdhani',sans-serif;outline:none;background:#0a0a1a;color:#fff;-webkit-appearance:none;transition:0.2s;}
.search-wrap input:focus{border-color:var(--purple);box-shadow:0 0 12px #9900ff33;}
.search-wrap input::placeholder{color:#555;}
.categories{display:flex;overflow-x:auto;gap:8px;padding:10px 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.categories::-webkit-scrollbar{display:none;}
.cat-btn{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;padding:9px 16px;border-radius:20px;border:1px solid var(--purple);color:#cc55ff;background:#9900ff15;white-space:nowrap;cursor:pointer;transition:0.2s;min-height:36px;display:flex;align-items:center;user-select:none;-webkit-user-select:none;}
.cat-btn:hover,.cat-btn.active,.cat-btn:active{background:var(--purple);color:#fff;box-shadow:0 0 14px #9900ff55;}
.section-header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;}
.section-header h2{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
.section-header::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--cyan),transparent);}
.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;padding:0 12px 20px;}
.game-card{position:relative;height:210px;border-radius:14px;overflow:hidden;border:1px solid #00f0ff22;box-shadow:0 0 10px #00000088;transition:transform 0.25s,box-shadow 0.25s;cursor:pointer;background:var(--bg3);-webkit-tap-highlight-color:transparent;}
.game-card:active{transform:scale(0.97);}
@media(hover:hover){.game-card:hover{transform:scale(1.03);box-shadow:0 0 20px #00f0ff44;border-color:var(--cyan);}}
.game-card img{width:100%;height:100%;object-fit:cover;display:block;}
.game-card .overlay{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,rgba(0,0,0,0.95) 55%,rgba(0,0,0,0.3));padding:8px;box-sizing:border-box;}
.game-card h4{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--cyan);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.game-card p{font-size:10px;color:#bbb;margin:0 0 7px 0;text-align:left;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.badge-cat{display:inline-block;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;padding:2px 7px;border-radius:10px;border:1px solid #00f0ff44;color:var(--cyan);background:#00f0ff11;margin-bottom:4px;}
.play-btn{width:100%;padding:9px;border:none;border-radius:8px;background:linear-gradient(90deg,var(--cyan),#0088cc);color:#000;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:900;cursor:pointer;letter-spacing:1px;transition:0.2s;min-height:36px;}
.play-btn:active{filter:brightness(1.2);transform:scale(0.98);}
.empty{grid-column:1/-1;text-align:center;padding:40px 20px;font-family:'Orbitron',sans-serif;font-size:13px;color:#555;letter-spacing:2px;}
#player{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.98);z-index:9999;flex-direction:column;}
.player-header{background:#000;border-bottom:1px solid #9900ff44;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
.player-title{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--cyan);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.close-btn{background:#e74c3c;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;min-height:36px;flex-shrink:0;transition:0.2s;}
.close-btn:active{filter:brightness(1.2);}
#gameFrame{width:100%;flex:1;border:none;display:block;}
.comments-section{background:var(--bg3);padding:16px;border-radius:12px;margin:0 12px 24px;border:1px solid #9900ff22;}
.comments-section h2{font-family:'Orbitron',sans-serif;font-size:13px;color:#fff;letter-spacing:2px;margin-bottom:14px;}
.comment-form{display:flex;gap:8px;margin-bottom:14px;}
.comment-form input{flex:1;padding:10px 12px;border-radius:8px;border:1px solid #9900ff44;background:#000;color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;min-height:42px;}
.comment-form input:focus{border-color:var(--purple);}
.comment-form button{padding:10px 16px;border:none;border-radius:8px;background:var(--purple);color:#fff;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;cursor:pointer;min-height:42px;white-space:nowrap;}
#comments-list .comment{background:#000;padding:10px 12px;border-radius:8px;margin-bottom:8px;font-size:13px;border-left:3px solid var(--cyan);}
footer{text-align:center;padding:16px;background:var(--bg2);font-size:12px;color:#555;border-top:1px solid #9900ff22;}
footer a{color:#9900ff88;text-decoration:none;margin:0 6px;}
footer a:hover{color:var(--purple);}
@media(max-width:360px){.games{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 10px 16px;}.game-card{height:195px;}}
@media(min-width:600px){.games{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));}}
@media(min-width:900px){.games{grid-template-columns:repeat(auto-fill,minmax(185px,1fr));}}
</style>

function render(list){
  const c=document.getElementById("games");c.innerHTML="";
  if(!list.length){c.innerHTML='<div class="empty">Aucun jeu trouvé 😕</div>';return;}
  list.forEach(g=>{
    const d=document.createElement('div');d.className='game-card';
    const safeName=g.name.replace(/'/g,"\\'").replace(/"/g,'&quot;');
    d.innerHTML=`<img src="${g.img}" alt="${g.name}" loading="lazy"><div class="overlay"><span class="badge-cat">${g.cat}</span><h4>${g.name}</h4><p>${g.desc}</p><button class="play-btn" onclick="play('${g.url}','${safeName}')">▶ JOUER</button></div>`;
    c.appendChild(d);
  });
}
render(games);

function filter(cat,btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const t=document.getElementById('section-title');
  if(cat==='Tous'){t.textContent='Tous les jeux';render(games);}
  else{t.textContent=cat;render(games.filter(g=>g.cat===cat));}
}

function searchGame(){
  const v=document.getElementById("search").value.toLowerCase().trim();
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.cat-btn').classList.add('active');
  if(!v){render(games);return;}
  render(games.filter(g=>g.name.toLowerCase().includes(v)||g.desc.toLowerCase().includes(v)));
}

function play(url,name){
  document.getElementById("player-title").textContent=name||"Jeu";
  document.getElementById("gameFrame").src=url;
  const p=document.getElementById("player");
  p.style.display="flex";
  document.body.style.overflow="hidden";
}
function closeGame(){
  document.getElementById("player").style.display="none";
  document.getElementById("gameFrame").src="";
  document.body.style.overflow="";
}

function addComment(){
  const input=document.getElementById("comment-input");
  const text=input.value.trim();
  if(!text)return;
  const div=document.createElement("div");
  div.className="comment";div.textContent=text;
  document.getElementById("comments-list").prepend(div);
  input.value="";
}
</script>
