.categories button{

.categories button:hover{

.games{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
  padding:15px;
}
.game-card {
  position: relative;
  width: 100%;
  height: 210px; /* hauteur totale de la carte */
  border-radius: 12px;
  overflow: hidden;
}

.game-card img {
  width: 100%;
  height: 100%; /* prend toute la hauteur de la carte */
  object-fit: cover; /* l'image remplit le cadre sans déformation */
}

.game-card:hover {
  transform: scale(1.03);
}
.game-card .overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.4));
  color: #fff;
  padding: 2px;
  box-sizing: border-box;
}
.game-card h4{
  margin:5px;
  font-size:12px;
  margin: 0;
  color: #00f0ff;
}
.game-card button{
  margin:8px;
  padding:5px;
  width:80%;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#9900ff,#00d8ff);
  color:white;
  cursor:pointer;
}

/* PLAYER */
#player{
  display:none;
  position:fixed;
  inset:0;
  background:#000;
  z-index:999;
}
#player iframe{
  width:100%;
  height:100%;
  border:none;
}
#closePlayer{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}
</style>

<div class="comments-section">
  <h2>💬 Commentaires</h2>
  
  <div class="comment-form">
    <input type="text" id="comment-input" placeholder="Écris ton commentaire..." />
    <button onclick="addComment()">Publier</button>
  </div>
  
  <div id="comments-list"></div>
</div>

<style>
.comments-section{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin:20px 0;
}

.comments-section h2{
  color:#a855f7;
  margin-bottom:10px;
}

.comment-form{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.comment-form input{
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
  outline:none;
}

.comment-form button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#a855f7;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

#comments-list .comment{
  background:#0f172a;
  padding:8px 12px;
  border-radius:8px;
  margin-bottom:8px;
  font-size:13px;
}
</style>

<script>
function addComment(){
  const input=document.getElementById("comment-input");
  const text=input.value.trim();
  if(!text) return;

  const commentList=document.getElementById("comments-list");
  const div=document.createElement("div");
  div.className="comment";
  div.textContent=text;
  commentList.prepend(div);

  input.value="";
}
</script>

const container = document.getElementById("games");

function render(list){
  container.innerHTML="";
  list.forEach(g=>{
   container.innerHTML += `
  <div class="game-card">
    <img src="${g.img}" alt="${g.name}">
    <div class="overlay">
      <h4>${g.name}</h4>
      <p>${g.desc}</p>
      <button onclick="play('${g.url}')">▶️ Play</button>
    </div>
  </div>`;
  });
}
render(games);

function filter(cat){
  if(cat==="Tous") render(games);
  else render(games.filter(g=>g.cat===cat));
}

function searchGame(){
  const v = search.value.toLowerCase();
  render(games.filter(g=>g.name.toLowerCase().includes(v)));
}

function play(url){
  document.getElementById("player").style.display="block";
  document.getElementById("gameFrame").src=url;
}
function closeGame(){
  document.getElementById("player").style.display="none";
  document.getElementById("gameFrame").src="";
