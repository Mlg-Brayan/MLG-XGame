<style>
/* ── VARIABLES ── */
:root {
  --purple: #9900ff;
  --cyan: #00f0ff;
  --bg: #000;
  --bg2: #0a0a1a;
  --bg3: #1a0a2e;
  --text: #ccc;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: linear-gradient(135deg, #000, #0a0a1a);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── HEADER ── */
header {
  background: #000;
  box-shadow: 0 0 25px #9900ff55;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 900;
  background: linear-gradient(90deg, var(--purple), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
  text-decoration: none;
}

.back-btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  color: var(--cyan);
  text-decoration: none;
  border: 1px solid var(--cyan);
  padding: 8px 14px;
  border-radius: 6px;
  letter-spacing: 1px;
  transition: 0.25s;
  min-height: 36px;
  display: flex;
  align-items: center;
}
.back-btn:hover, .back-btn:active {
  background: var(--cyan);
  color: #000;
}

/* ── SEARCH ── */
.search-wrap {
  padding: 14px 16px 8px;
}

.search-wrap input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid #9900ff44;
  border-radius: 10px;
  font-size: 15px;
  font-family: 'Rajdhani', sans-serif;
  outline: none;
  background: #0a0a1a;
  color: #fff;
  -webkit-appearance: none;
  transition: 0.2s;
}
.search-wrap input:focus {
  border-color: var(--purple);
  box-shadow: 0 0 12px #9900ff33;
}
.search-wrap input::placeholder { color: #666; }

/* ── CATEGORIES ── */
.categories {
  display: flex;
  overflow-x: auto;
  gap: 8px;
  padding: 10px 16px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.categories::-webkit-scrollbar { display: none; }

.cat-btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 9px 16px;
  border-radius: 20px;
  border: 1px solid var(--purple);
  color: #cc55ff;
  background: #9900ff15;
  white-space: nowrap;
  cursor: pointer;
  transition: 0.2s;
  min-height: 36px;
  display: flex;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
}
.cat-btn:hover, .cat-btn.active, .cat-btn:active {
  background: var(--purple);
  color: #fff;
  box-shadow: 0 0 14px #9900ff55;
}

/* ── SECTION TITLE ── */
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 16px 10px;
}
.section-header h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
}
.section-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--purple), transparent);
}

/* ── GAMES GRID ── */
.games {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 12px;
  padding: 0 12px 20px;
}

/* ── CARD ── */
.card {
  position: relative;
  height: 215px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #9900ff33;
  box-shadow: 0 0 10px #00000088;
  transition: transform 0.25s, box-shadow 0.25s;
  cursor: pointer;
  background: var(--bg3);
  -webkit-tap-highlight-color: transparent;
}

.card:active {
  transform: scale(0.97);
}

@media (hover: hover) {
  .card:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px #9900ff55;
    border-color: var(--purple);
  }
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.card-content {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 8px;
  box-sizing: border-box;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 60%, rgba(0,0,0,0.4));
}

.card h3 {
  margin: 0 0 2px 0;
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: var(--cyan);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card p {
  font-size: 11px;
  margin: 0 0 6px 0;
  color: #bbb;
  text-align: left;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── BADGE CATEGORIE ── */
.badge-cat {
  display: inline-block;
  font-family: 'Orbitron', sans-serif;
  font-size: 8px;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid #9900ff55;
  color: #cc55ff;
  background: #9900ff15;
  margin-bottom: 4px;
}

/* ── DOWNLOAD BUTTON ── */
.download-btn {
  width: 100%;
  padding: 9px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg, var(--purple), #6600cc);
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: 0.2s;
  min-height: 36px;
}
.download-btn:active { filter: brightness(1.3); transform: scale(0.98); }

/* ── DOWNLOAD MENU ── */
.download-menu {
  display: none;
  position: absolute;
  bottom: 62px;
  left: 8px;
  right: 8px;
  flex-direction: column;
  background: #0a0a1a;
  border: 1px solid #9900ff55;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 20px #9900ff44, 0 8px 20px #000;
  z-index: 20;
  animation: pop 0.15s ease;
}

@keyframes pop {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.download-menu a {
  padding: 10px 12px;
  color: #ccc;
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  border-bottom: 1px solid #ffffff0a;
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 40px;
  transition: 0.15s;
}
.download-menu a:last-child { border-bottom: none; }
.download-menu a:hover, .download-menu a:active {
  background: var(--purple);
  color: #fff;
}

/* ── LINK TO GAME PAGE ── */
.card-link {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: calc(100% - 90px);
  z-index: 5;
  text-decoration: none;
}

/* ── EMPTY STATE ── */
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 40px 20px;
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  color: #555;
  letter-spacing: 2px;
}

/* ── COMMENTS ── */
.comments-section {
  background: var(--bg3);
  padding: 16px;
  border-radius: 12px;
  margin: 0 12px 24px;
  border: 1px solid #9900ff22;
}
.comments-section h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  color: #fff;
  letter-spacing: 2px;
  margin-bottom: 14px;
}
.comment-form {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.comment-form input {
  flex: 1;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #9900ff44;
  background: #000;
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  outline: none;
  min-height: 42px;
}
.comment-form input:focus { border-color: var(--purple); }
.comment-form button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  background: var(--purple);
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  min-height: 42px;
  white-space: nowrap;
}
#comments-list .comment {
  background: #000;
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 13px;
  border-left: 3px solid var(--purple);
}

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 16px;
  background: var(--bg2);
  font-size: 12px;
  color: #555;
  border-top: 1px solid #9900ff22;
}
footer a {
  color: #9900ff88;
  text-decoration: none;
  margin: 0 6px;
}
footer a:hover { color: var(--purple); }

/* ── RESPONSIVE ── */
@media (max-width: 360px) {
  .games { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 10px 16px; }
  .card { height: 200px; }
}
@media (min-width: 600px) {
  .games { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
}
@media (min-width: 900px) {
  .games { grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); }
}
</style>
</head>

/* ═══════════════════════════════════════
   RENDER — chaque carte clique → jeux/slug.html
═══════════════════════════════════════ */
function render(list) {
  const container = document.getElementById("games");
  container.innerHTML = "";

  if (list.length === 0) {
    container.innerHTML = '<div class="empty">Aucun jeu trouvé 😕</div>';
    return;
  }

  list.forEach((game, index) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <a class="card-link" href="jeux/${game.slug}.html" aria-label="Voir ${game.nom}"></a>
      <img src="${game.img}" alt="${game.nom}" loading="lazy" onerror="this.style.background='#1a0a2e';this.src=''">
      <div class="card-content">
        <span class="badge-cat">${game.categorie}</span>
        <h3>${game.nom}</h3>
        <p>${game.description}</p>
        <button class="download-btn" onclick="toggleMenu(event,'menu${index}')">📥 Télécharger</button>
        <div class="download-menu" id="menu${index}">
          <a href="${game.playstore}" target="_blank" rel="noopener">▶ Play Store</a>
          <a href="${game.appstore}" target="_blank" rel="noopener"> App Store</a>
          <a href="${game.apk}" target="_blank" rel="noopener">⬇ APK Direct</a>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

render(androidGames);

/* FILTER */
function filter(cat, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const title = document.getElementById('section-title');
  if (cat === 'all') {
    title.textContent = 'Tous les jeux';
    render(androidGames);
  } else {
    title.textContent = cat;
    render(androidGames.filter(g => g.categorie === cat));
  }
}

/* SEARCH */
function searchGame() {
  const text = document.getElementById("search").value.toLowerCase().trim();
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.cat-btn').classList.add('active');
  if (!text) { render(androidGames); return; }
  render(androidGames.filter(g =>
    g.nom.toLowerCase().includes(text) ||
    g.categorie.toLowerCase().includes(text)
  ));
}

/* DOWNLOAD MENU TOGGLE */
function toggleMenu(event, id) {
  event.stopPropagation();
  event.preventDefault();
  document.querySelectorAll(".download-menu").forEach(m => {
    if (m.id !== id) m.style.display = "none";
  });
  const menu = document.getElementById(id);
  menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}

document.addEventListener("click", () => {
  document.querySelectorAll(".download-menu").forEach(m => m.style.display = "none");
});

/* COMMENTS */
function addComment() {
  const input = document.getElementById("comment-input");
  const text = input.value.trim();
  if (!text) return;
  const div = document.createElement("div");
  div.className = "comment";
  div.textContent = text;
  document.getElementById("comments-list").prepend(div);
  input.value = "";
}
</script>
